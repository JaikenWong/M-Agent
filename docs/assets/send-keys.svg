<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-label="magent-tui send keys">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="540" fill="url(#bg)"/>
  <rect x="36" y="36" width="1128" height="468" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="72" y="96" fill="#f8fafc" font-size="36" font-family="Menlo, Monaco, monospace">magent-tui send keys</text>
  <text x="72" y="132" fill="#94a3b8" font-size="20" font-family="Menlo, Monaco, monospace">Use Enter first. If it fails in your terminal, use F5.</text>

  <rect x="72" y="168" width="1056" height="72" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="96" y="212" fill="#22c55e" font-size="24" font-family="Menlo, Monaco, monospace">Enter</text>
  <text x="300" y="212" fill="#e2e8f0" font-size="22" font-family="Menlo, Monaco, monospace">send current task (recommended)</text>

  <rect x="72" y="252" width="1056" height="72" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="96" y="296" fill="#38bdf8" font-size="24" font-family="Menlo, Monaco, monospace">Ctrl+Enter</text>
  <text x="300" y="296" fill="#e2e8f0" font-size="22" font-family="Menlo, Monaco, monospace">send task when terminal supports it</text>

  <rect x="72" y="336" width="1056" height="72" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="96" y="380" fill="#f59e0b" font-size="24" font-family="Menlo, Monaco, monospace">F5</text>
  <text x="300" y="380" fill="#e2e8f0" font-size="22" font-family="Menlo, Monaco, monospace">keyboard fallback send</text>

  <rect x="72" y="420" width="1056" height="72" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="96" y="464" fill="#a78bfa" font-size="24" font-family="Menlo, Monaco, monospace">Send button</text>
  <text x="300" y="464" fill="#e2e8f0" font-size="22" font-family="Menlo, Monaco, monospace">mouse fallback send</text>
</svg>
